# EcoRouter example config — copy to /etc/ecorouter/config.toml or ~/.ecorouter/config.toml
# Secrets (API keys, token hashes) NEVER go here — see secrets.toml / SQLite.
# See ~/.ecorouter/pricing.toml for model prices (eco pricing set / interactive wizard).

[server]
port       = 8080
host       = "127.0.0.1"   # loopback ONLY — public access via Caddy
domain     = "eco.you.dev"
timeout_ms = 30000

[security]
require_tls       = true
max_body_bytes    = 10485760      # 10MB
global_rate       = "600/min"
auth_fail_lockout = "5/1m -> 15m" # 5 fails in 1 min => 15 min IP ban
global_daily_cap  = 0             # USD; 0 = disabled

[access]                          # empty allow = open ("anywhere")
allow = []
deny  = []

# [providers.openai]
# type     = "openai"
# base_url = "https://api.openai.com/v1"
# models   = ["gpt-4o", "gpt-4o-mini"]   # cached catalog; key in secrets

# [routes.default]
# mode   = "fallback"
# models = ["gpt-4o", "gpt-4o-mini"]
# via    = ""
# via_required = false

# [savers.headroom]
# url = "http://127.0.0.1:8787"

[defaults]
active_route  = ""
saver_default = ""

[health]
window          = 20
error_threshold = 0.5
min_requests    = 5
cooldown_ms     = 60000
